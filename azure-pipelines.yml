trigger:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  javaVersion: '21'             
  # appName: 'nome-do-app-service'   # comentado por enquanto
  # resourceGroup: 'rg-seu-projeto'   # comentado por enquanto

steps:
  - task: UseJava@1
    inputs:
      versionSpec: '$(javaVersion)'

  - script: mvn -B clean package -DskipTests
    displayName: 'Build Maven'

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: 'target'
      ArtifactName: 'drop'

  # - task: AzureWebApp@1          
